components:
  schemas:
    Branch:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        code:
          type: string
          maxLength: 24
        address:
          type: string
        city:
          type: string
          maxLength: 80
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - updated_at
    DayOfWeekEnum:
      enum:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday
      type: string
      description: |-
        * `monday` - Monday
        * `tuesday` - Tuesday
        * `wednesday` - Wednesday
        * `thursday` - Thursday
        * `friday` - Friday
        * `saturday` - Saturday
        * `sunday` - Sunday
    FeePayment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
        student_name:
          type: string
          readOnly: true
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        payment_date:
          type: string
          format: date
        payment_mode:
          $ref: '#/components/schemas/PaymentModeEnum'
        reference:
          type: string
          maxLength: 140
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - amount
      - created_at
      - id
      - payment_date
      - student
      - student_name
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
